name: Meridian provisional v2.2 market-profile backtest

on:
  workflow_dispatch:
    inputs:
      markets:
        description: JSON array of market shards
        required: true
        default: '["US","CN","HK","TW","JP","KR","SG"]'
        type: string
      stocks:
        description: Stocks per market
        required: true
        default: "500"
        type: string
      etfs:
        description: ETFs per market
        required: true
        default: "100"
        type: string
      evaluation_sessions:
        description: Locked OOS trading sessions
        required: true
        default: "504"
        type: string
      publish_results:
        description: Publish only a complete seven-market result to Meridian
        required: true
        default: true
        type: boolean
  schedule:
    - cron: "23 3 * * 0"

permissions:
  contents: read

concurrency:
  group: meridian-v2-2-provisional-backtest
  cancel-in-progress: false

jobs:
  market:
    name: ${{ matrix.market }} shard
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        market: ${{ fromJSON(inputs.markets || '["US","CN","HK","TW","JP","KR","SG"]') }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: bridge/requirements-cloud.txt
      - run: python -m pip install --requirement bridge/requirements-cloud.txt
      - name: Restore, analyze and compare ${{ matrix.market }}
        env:
          PYTHONUNBUFFERED: "1"
          MARKET: ${{ matrix.market }}
          STOCKS: ${{ inputs.stocks || '500' }}
          ETFS: ${{ inputs.etfs || '100' }}
          EVALUATION_SESSIONS: ${{ inputs.evaluation_sessions || '504' }}
          MERIDIAN_ENDPOINT: ${{ secrets.MERIDIAN_ENDPOINT }}
          INGEST_HMAC_SECRET: ${{ secrets.INGEST_HMAC_SECRET }}
          OAI_SITES_BYPASS_TOKEN: ${{ secrets.OAI_SITES_BYPASS_TOKEN }}
        run: >-
          python -X faulthandler -m bridge.backtest
          --markets "$MARKET"
          --stocks "$STOCKS"
          --etfs "$ETFS"
          --workers 12
          --evaluation-sessions "$EVALUATION_SESSIONS"
          --output "market-$MARKET.json"
          --endpoint "$MERIDIAN_ENDPOINT"
          --secret "$INGEST_HMAC_SECRET"
          --sites-token "$OAI_SITES_BYPASS_TOKEN"
          --no-upload
      - name: Save completed market checkpoint
        uses: actions/upload-artifact@v4.6.2
        with:
          name: backtest-${{ matrix.market }}
          path: market-${{ matrix.market }}.json
          if-no-files-found: error
          retention-days: 7

  aggregate:
    name: Aggregate seven-market evidence
    needs: market
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: bridge/requirements-cloud.txt
      - run: python -m pip install --requirement bridge/requirements-cloud.txt
      - name: Restore market checkpoints
        uses: actions/download-artifact@v4.3.0
        with:
          pattern: backtest-*
          path: backtest-shards
          merge-multiple: true
      - name: Aggregate and conditionally publish
        env:
          PYTHONUNBUFFERED: "1"
          PUBLISH_RESULTS: ${{ github.event_name == 'schedule' || inputs.publish_results }}
          MERIDIAN_ENDPOINT: ${{ secrets.MERIDIAN_ENDPOINT }}
          INGEST_HMAC_SECRET: ${{ secrets.INGEST_HMAC_SECRET }}
          OAI_SITES_BYPASS_TOKEN: ${{ secrets.OAI_SITES_BYPASS_TOKEN }}
        run: |
          extra=(--no-upload)
          if [[ "$PUBLISH_RESULTS" == "true" ]]; then extra=(); fi
          python -X faulthandler -m bridge.backtest \
            --aggregate-dir backtest-shards \
            --output backtest-result-v2.2.json \
            --endpoint "$MERIDIAN_ENDPOINT" \
            --secret "$INGEST_HMAC_SECRET" \
            --sites-token "$OAI_SITES_BYPASS_TOKEN" \
            "${extra[@]}"
      - name: Save aggregate evidence
        uses: actions/upload-artifact@v4.6.2
        with:
          name: backtest-v2.2-aggregate
          path: backtest-result-v2.2.json
          if-no-files-found: error
          retention-days: 30
