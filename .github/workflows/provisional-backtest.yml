name: Meridian provisional v2.1 backtest

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 0"

permissions:
  contents: read

concurrency:
  group: meridian-v2-1-provisional-backtest
  cancel-in-progress: false

jobs:
  compare:
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: bridge/requirements-cloud.txt
      - run: python -m pip install --requirement bridge/requirements-cloud.txt
      - name: Compare v2.1 candidate with v2.0
        env:
          MERIDIAN_ENDPOINT: ${{ secrets.MERIDIAN_ENDPOINT }}
          INGEST_HMAC_SECRET: ${{ secrets.INGEST_HMAC_SECRET }}
          OAI_SITES_BYPASS_TOKEN: ${{ secrets.OAI_SITES_BYPASS_TOKEN }}
        run: >-
          python -X faulthandler -m bridge.backtest
          --stocks 500
          --etfs 100
          --endpoint "$MERIDIAN_ENDPOINT"
          --secret "$INGEST_HMAC_SECRET"
          --sites-token "$OAI_SITES_BYPASS_TOKEN"
